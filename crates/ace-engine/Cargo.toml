[package]
name = "ace-engine"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "outpace"
path = "src/main.rs"

[lib]
name = "ace_engine"
path = "src/lib.rs"

[dependencies]
ace-wire = { path = "../ace-wire" }
ace-media = { path = "../ace-media" }
tokio = { version = "1", features = ["full"] }
bytes = "1"
async-trait = "0.1"
