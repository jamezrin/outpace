name: ARMv7 portability

on:
  # Only run when something that can actually change the ARMv7 build or its runtime
  # behavior moves: the shipped crates, test fixtures, workspace/toolchain config, the
  # container image, or this workflow itself. Docs and dev-only tooling (`tools/**`,
  # excluded from the emulated workspace run below) cannot affect it, so they are skipped
  # to keep the slow QEMU jobs off unrelated PRs.
  pull_request:
    paths:
      - .github/workflows/armv7-portability.yml
      - crates/**
      - tests/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - Dockerfile
      - .dockerignore
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TARGET: armv7-unknown-linux-musleabihf

jobs:
  test:
    name: Workspace tests under ARMv7 QEMU
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      QEMU_CPU: cortex-a7
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ env.TARGET }}

      - name: Install ARMv7 musl toolchain and QEMU runner
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ env.TARGET }}
          runner: qemu-user

      - name: Run offline workspace suite
        env:
          RUST_TEST_THREADS: 1
        # `swarmtest` is a dev-only, `publish = false` docker-orchestration harness that never
        # runs on an ARMv7 device; excluding it keeps its heavy dependency tree (reqwest,
        # tokio, flate2, tar) from being cross-compiled and its tests from running under QEMU.
        run: cargo test --locked --workspace --exclude swarmtest --all-targets --target "$TARGET"

  container-smoke:
    name: ARMv7 container startup and health smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ARMv7 image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm/v7
          load: true
          tags: outpace:armv7-smoke
          # Persist the emulated from-source build across runs; a full ARMv7 Rust compile
          # under QEMU is the slowest step in this workflow.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start daemon and check health
        shell: bash
        run: |
          set -euo pipefail
          container="$(docker run --detach --rm --platform linux/arm/v7 \
            --publish 127.0.0.1::6878 \
            --env OUTPACE_ENABLE_INBOUND=0 \
            --env OUTPACE_ENABLE_SEEDING=0 \
            outpace:armv7-smoke)"
          trap 'docker rm --force "$container" >/dev/null 2>&1 || true' EXIT
          port="$(docker port "$container" 6878/tcp | sed 's/.*://')"
          curl --fail --retry 30 --retry-delay 1 --retry-all-errors \
            "http://127.0.0.1:${port}/healthz"
