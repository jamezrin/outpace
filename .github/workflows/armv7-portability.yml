name: ARMv7 portability

on:
  # Run on every PR: target behavior can change through toolchain, Cargo configuration,
  # fixtures, build plumbing, or repository-level files outside `crates/`.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TARGET: armv7-unknown-linux-musleabihf

jobs:
  test:
    name: Workspace tests under ARMv7 QEMU
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      QEMU_CPU: cortex-a7
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ env.TARGET }}

      - name: Install ARMv7 musl toolchain and QEMU runner
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ env.TARGET }}
          runner: qemu-user

      - name: Run offline workspace suite
        env:
          RUST_TEST_THREADS: 1
        run: cargo test --locked --workspace --all-targets --target "$TARGET"

  container-smoke:
    name: ARMv7 container startup and health smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ARMv7 image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm/v7
          load: true
          tags: outpace:armv7-smoke

      - name: Start daemon and check health
        shell: bash
        run: |
          set -euo pipefail
          container="$(docker run --detach --rm --platform linux/arm/v7 \
            --publish 127.0.0.1::6878 \
            --env OUTPACE_ENABLE_INBOUND=0 \
            --env OUTPACE_ENABLE_SEEDING=0 \
            outpace:armv7-smoke)"
          trap 'docker rm --force "$container" >/dev/null 2>&1 || true' EXIT
          port="$(docker port "$container" 6878/tcp | sed 's/.*://')"
          curl --fail --retry 30 --retry-delay 1 --retry-all-errors \
            "http://127.0.0.1:${port}/healthz"
