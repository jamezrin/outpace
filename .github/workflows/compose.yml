name: Compose smoke

on:
  pull_request:
    paths:
      - .github/workflows/compose.yml
      - .env.example
      - compose.yml
      - Dockerfile
      - Cargo.lock
      - Cargo.toml
      - crates/**
  push:
    branches: [main]
    paths:
      - .github/workflows/compose.yml
      - .env.example
      - compose.yml
      - Dockerfile
      - Cargo.lock
      - Cargo.toml
      - crates/**
  workflow_dispatch:
    inputs:
      run_arm64:
        description: Also run the emulated linux/arm64 smoke
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.run_arm64 && '["linux/amd64", "linux/arm64"]' || '["linux/amd64"]') }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate Compose model
        run: docker compose config --quiet

      - name: Build local image
        run: docker buildx build --platform "${{ matrix.platform }}" --load --tag local/outpace:compose-smoke .

      - name: Start and verify service
        env:
          OUTPACE_IMAGE: local/outpace:compose-smoke
          TARGET_PLATFORM: ${{ matrix.platform }}
        run: |
          set -eu
          docker compose up --detach --wait --wait-timeout 90
          curl --fail --silent --show-error http://127.0.0.1:6878/healthz
          curl --fail --silent --show-error http://127.0.0.1:6878/networks
          architecture=$(docker compose exec -T outpace uname -m)
          case "$TARGET_PLATFORM:$architecture" in
            linux/amd64:x86_64|linux/arm64:aarch64) ;;
            *) echo "unexpected container architecture: $architecture for $TARGET_PLATFORM" >&2; exit 1 ;;
          esac
          docker compose exec -T outpace sh -eu -c '
            test "$(id -u)" -ne 0
            touch /var/lib/outpace/.compose-write-test
            rm /var/lib/outpace/.compose-write-test
          '

      - name: Verify SIGTERM shutdown
        if: success()
        env:
          OUTPACE_IMAGE: local/outpace:compose-smoke
        run: |
          set -eu
          container_id=$(docker compose ps --quiet outpace)
          docker compose stop --timeout 30 outpace
          test "$(docker inspect --format '{{.State.ExitCode}}' "$container_id")" -eq 0

      - name: Show logs after failure
        if: failure()
        env:
          OUTPACE_IMAGE: local/outpace:compose-smoke
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        env:
          OUTPACE_IMAGE: local/outpace:compose-smoke
        run: docker compose down --volumes --remove-orphans
